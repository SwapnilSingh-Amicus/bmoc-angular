<div class="create-task-container">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h2 class="page-title" style="margin-bottom: 4px;">Create New Task</h2>
      <p class="header-subtitle">Fill in the required information to create a new workflow task</p>
    </div>
  </div>

  <!-- Form Content --> 
   <div
    class="form-content"
    style="background-color: #fff; border: 1px solid #e0e5ec; border-radius: 6px; box-shadow: 0 1px 2px rgba(21,39,63,0.04); overflow: hidden;"
  >

    <div class="form-section" style="padding: 24px;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <!-- Stage Name -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">
            Stage Name <span style="color: #ed4e33;">*</span>
          </label>
<select
            [(ngModel)]="stageName"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="" style="color: #b0b8c4; background-color: #fff;">— Select Stage —</option>
            <option value="R&D Approval">R&D Approval</option>
            <option value="TCO Approval Stage">TCO Approval Stage</option>
            <option value="Marketing">Marketing / Product Mgt</option>
            <option value="Manufacturing Approval">Manufacturing Approval</option>
            <option value="Purchasing Approval">Purchasing Approval</option>
          </select>
        </div>

        <!-- Task Type -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">
            Task Type <span style="color: #ed4e33;">*</span>
          </label>
          <select
            [(ngModel)]="taskType"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="" style="color: #b0b8c4; background-color: #fff;">— Select Task Type —</option>
            <option value="NP">NP</option>
            <option value="Multi">Multi</option>
            <option value="Auto">Auto</option>
          </select>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <!-- Task Title -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">
            Task Title <span style="color: #ed4e33;">*</span>
          </label>
          <input
            type="text"
            placeholder="Enter Task Title"
            [(ngModel)]="taskTitle"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; color: #15273f; outline: none; font-family: inherit; background-color: #fff; transition: all 0.15s;"
          />
        </div>

        <!-- Responsibility -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Responsibility</label>
          <select
            [(ngModel)]="responsibility"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="" style="color: #b0b8c4; background-color: #fff;">— Select Responsibility —</option>
            <option value="R&D">R&D</option>
            <option value="Marketing">Marketing</option>
            <option value="Quality">Quality</option>
            <option value="Manufacturing">Manufacturing</option>
            <option value="Purchasing">Purchasing</option>
          </select>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <!-- Request Type -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Request Type</label>
          <select
            [(ngModel)]="requestType"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="" style="color: #b0b8c4; background-color: #fff;">— Select Request Type —</option>
            <option value="Finished Product">Finished Product</option>
            <option value="Raw Material">Raw Material</option>
            <option value="Experimental">Experimental</option>
          </select>
        </div>

        <!-- Business Type -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Business</label>
          <div style="display: flex; gap: 20px; align-items: center; padding-top: 8px;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
              <input type="radio" [(ngModel)]="businessType" value="All" style="cursor: pointer;" />
              <span style="font-size: 12px; color: #15273f; font-weight: 500;">All</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
              <input type="radio" [(ngModel)]="businessType" value="Division" style="cursor: pointer;" />
              <span style="font-size: 12px; color: #15273f; font-weight: 500;">Division</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
              <input type="radio" [(ngModel)]="businessType" value="Profit Center" style="cursor: pointer;" />
              <span style="font-size: 12px; color: #15273f; font-weight: 500;">Profit Center</span>
            </label>
          </div>
        </div>
      </div>     

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <!-- Business Role/User -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Business Role/User</label>
          <select
            [(ngModel)]="businessRole"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="" style="color: #b0b8c4; background-color: #fff;">— Select Role —</option>
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="User">User</option>
            <option value="Reviewer">Reviewer</option>
          </select>
        </div>

        <!-- Reason Code -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Reason Code</label>
          <select
            [(ngModel)]="reasonCode"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="All" style="color: #b0b8c4; background-color: #fff;">— Select Reason Code —</option>            
            <option value="RM001">RM001</option>
            <option value="RM002">RM002</option>
          </select>
        </div>
      </div>

      <!-- Task Instructions + Site (side by side) -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Task Instructions</label>
          <textarea
            placeholder="Enter task instructions..."
            [(ngModel)]="taskInstructions"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 12px; font-size: 13px; color: #15273f; outline: none; font-family: inherit; background-color: #fff; resize: vertical; transition: all 0.15s;"
          ></textarea>
        </div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 600; color: #15273f;">Site</label>
          <select
            [(ngModel)]="location"
            style="height: 38px; border: 1.5px solid #e0e5ec; border-radius: 4px; padding: 0 12px; font-size: 13px; outline: none; font-family: inherit; background-color: #fff; color: #15273f; transition: all 0.15s;"
          >
<option value="All" style="color: #b0b8c4; background-color: #fff;">— Select Site —</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Chennai">Chennai</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Delhi">Delhi</option>
            <option value="Pune">Pune</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Kolkata">Kolkata</option>
          </select>
        </div>
      </div>

      

    </div>
  </div>

  <!-- Page Footer with Action Buttons -->
  <div
    class="page-footer"
    style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;"
  >
    <button
      (click)="cancelCreate()"
      style="height: 40px; padding: 0 28px; font-size: 12px; font-weight: 700; border: 1.5px solid #d2ddea; border-radius: 20px; background-color: #fff; color: #15273f; cursor: pointer; font-family: inherit; transition: all 0.15s;"
    >
      CANCEL
    </button>
    <button
      (click)="saveNewTask()"
      [disabled]="isSaving()"
      [style.opacity]="isSaving() ? '0.6' : '1'"
      [style.cursor]="isSaving() ? 'not-allowed' : 'pointer'"
      style="height: 40px; padding: 0 28px; font-size: 12px; font-weight: 700; border: none; border-radius: 20px; background-color: #16283e; color: #fff; font-family: inherit; transition: all 0.15s;"
    >
      {{ isSaving() ? 'SAVING...' : 'SUBMIT' }}
    </button>
  </div>
</div>
