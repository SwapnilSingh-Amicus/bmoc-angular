<div class="date-picker-wrapper" (clickOutside)="closeCalendar()">
  <input 
    type="text" 
    [placeholder]="placeholder" 
    [value]="displayValue()"
    (click)="toggleCalendar()"
    readonly
    class="date-picker-input"
  />
  <svg 
    xmlns="http://www.w3.org/2000/svg" 
    width="16" 
    height="16" 
    viewBox="0 0 24 24" 
    fill="none" 
    stroke="currentColor" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    class="calendar-icon"
    (click)="toggleCalendar()">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
    <line x1="16" y1="2" x2="16" y2="6"></line>
    <line x1="8" y1="2" x2="8" y2="6"></line>
    <line x1="3" y1="10" x2="21" y2="10"></line>
  </svg>
  
  <div class="date-picker-calendar" 
       [class.align-right]="shouldAlignRight()"
       *ngIf="isOpen()">
    <div class="calendar-header">
      <button class="nav-btn" (click)="prevMonth()" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="month-year">{{ calendarHeader() }}</div>
      <button class="nav-btn" (click)="nextMonth()" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
    
    <div class="calendar-body">
      <div class="weekdays">
        <div *ngFor="let day of dayNames" class="weekday">{{ day }}</div>
      </div>
      
      <div class="days-grid">
        <button
          *ngFor="let day of calendarDays()"
          class="day-cell"
          [class.other-month]="!day.isCurrentMonth"
          [class.today]="day.isToday"
          [class.selected]="day.isSelected"
          (click)="selectDate(day)"
          type="button"
        >
          {{ day.date }}
        </button>
      </div>
    </div>
    
    <div class="calendar-footer">
      <button class="footer-btn" (click)="clearDate()" type="button">Clear</button>
      <button class="footer-btn footer-btn--primary" (click)="setToday()" type="button">Today</button>
    </div>
  </div>
</div>
